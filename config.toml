[server]
name = "NyahAO Server"
description = "A privacy-first AO2 server."
motd = "Welcome to NyahAO!"
max_players = 100
max_message_len = 256
asset_url = ""
multiclient_limit = 8

[network]
tcp_port = 27017
ws_port = 27018
bind_addr = "0.0.0.0"
# Set to true when running behind nginx/Cloudflare.
# Enables trust of X-Forwarded-For and X-Real-IP headers for real client IPs.
# Leave false for direct (no proxy) deployments.
reverse_proxy_mode = false
# External ports advertised to the master server when reverse_proxy_mode = true.
reverse_proxy_http_port = 80
reverse_proxy_https_port = 443

[privacy]
# If unset, a server secret is generated at startup and stored in the database.
# server_secret = ""

[logging]
log_level = "info"
log_chat = false

[master_server]
# Set to true to list your server publicly on the AO master server.
advertise = false
addr = "https://servers.aceattorneyonline.com/servers"
# Optional: hostname or IP to advertise. Leave unset to let the master server detect it.
# hostname = "your.domain.example"

[rate_limits]
# All per-client limits use a token bucket (rate = sustained tokens/sec, burst = max burst).
# Packets that exceed the limit are silently dropped.

# IC messages (MS packets)
ic_rate  = 3.0   # tokens per second
ic_burst = 5     # burst ceiling

# Music changes (MC packets)
mc_rate  = 1.0
mc_burst = 3

# OOC messages (CT packets, including commands)
ct_rate  = 2.0
ct_burst = 5

# Evidence operations (PE / DE / EE packets, shared bucket)
evidence_rate  = 5.0
evidence_burst = 10

# Mod call cooldown: seconds a client must wait between ZZ packets. 0 = no limit.
zz_cooldown_secs = 60

# New connections per source IP (applies to both TCP and WebSocket listeners).
# conn_rate is tokens per second; 0.0833 ≈ 5 connections per minute.
conn_rate  = 0.0833
conn_burst = 3
