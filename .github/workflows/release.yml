name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            artifact: nyahao-linux-x86_64

          - os: windows-latest
            name: Windows x86_64
            target: x86_64-pc-windows-msvc
            artifact: nyahao-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/nyahao ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/nyahao.exe ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          body: |
            ## Ferris-AO ${{ github.ref_name }}

            A privacy-first AO2 server supporting both **AO2 desktop clients** and **[WebAO](https://github.com/AttorneyOnlineVidya/webAO)** browser clients simultaneously.

            ### Features
            - Full WebAO support — browser and desktop clients share areas and see each other's IC messages in real time
            - Dual TCP + WebSocket transport
            - Full AO2 protocol (IC, music, evidence, pairing, health points, rebuttals, case alerts)
            - Privacy-by-design — IPs and HDIDs are hashed immediately and never stored
            - AES-256-GCM encrypted database, Argon2id passwords
            - Role-based moderation (kick, ban, mute, shadowmute, watchlist)
            - PROXY Protocol v2 + Cloudflare / nginx reverse proxy support

            ### Downloads
            | File | Platform |
            |------|----------|
            | `nyahao-linux-x86_64` | Linux x86_64 |
            | `nyahao-windows-x86_64.exe` | Windows x86_64 |

            ### Quick start
            ```bash
            # Linux
            chmod +x nyahao-linux-x86_64
            ./nyahao-linux-x86_64

            # Windows
            nyahao-windows-x86_64.exe
            ```
            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
