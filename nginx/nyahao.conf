#         listen     27016;
#         proxy_pass 127.0.0.1:27017;
#         proxy_protocol        on;    # prepends PROXY Protocol v2 header
#         proxy_connect_timeout 10s;
#         proxy_timeout         7200s;
#         limit_conn tcp_conn 5;
#     }
# }
