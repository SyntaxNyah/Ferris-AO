# ── TCP — legacy AO2-SDL clients (optional) ───────────────────────────────────
#
# Place this in a stream { } context in a separate file or nginx.conf.
# Requires nginx compiled with --with-stream.
#
# With Cloudflare: TCP passthrough requires Cloudflare Spectrum (paid).
# Without Cloudflare: expose port 27016 directly and clients connect to it.
#
# nginx prepends a PROXY Protocol v2 header so Ferris-AO can recover the
# real client IP. Requires reverse_proxy_mode = true in config.toml.
#
