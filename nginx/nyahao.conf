# Ferris-AO nginx configuration
#
# Example domain layout (replace with your own):
#   hatsune.miku.pizza  — gray-clouded in Cloudflare (DNS only, direct connection)
#                         Players connect here for the game (TCP + WSS)
#   miku.pizza          — orange-clouded in Cloudflare (proxied, CDN)
#                         Used for asset_url in config.toml
#
# Why two records?
#   - hatsune.miku.pizza must be gray-clouded so:
#       1. TCP clients can reach port 27017 directly (Cloudflare cannot proxy TCP)
#       2. certbot's HTTP-01 challenge works (requires direct VPS access on port 80)
#   - miku.pizza can be orange-clouded for CDN caching of your asset bundle
#
# ─────────────────────────────────────────────────────────────────────────────
# SETUP GUIDE
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Point your domain to the VPS in Cloudflare
#    -  miku.pizza         A  →  <your VPS IP>   (orange cloud = proxied)
#    -  hatsune.miku.pizza A  →  <your VPS IP>   (gray cloud  = DNS only)
#
# 2. Install nginx and certbot on the VPS
#    sudo apt install nginx certbot python3-certbot-nginx
#
# 3. Copy this file to /etc/nginx/sites-available/ferris-ao
#    sudo cp nginx/nyahao.conf /etc/nginx/sites-available/ferris-ao
#
# 4. Edit the file — replace hatsune.miku.pizza with your actual subdomain
#
# 5. Symlink it into sites-enabled
#    sudo ln -s /etc/nginx/sites-available/ferris-ao /etc/nginx/sites-enabled/ferris-ao
#    sudo nginx -t            # verify config
#    sudo systemctl reload nginx
#
# 6. Issue a Let's Encrypt certificate for the game subdomain
#    sudo certbot --nginx -d hatsune.miku.pizza
#    (certbot will also auto-update the ssl_certificate paths in this file)
#
# 7. Set config.toml values:
#    [network]
#    bind_addr              = "0.0.0.0"      # TCP must be reachable directly
#    tcp_port               = 27017
#    ws_port                = 27018          # nginx forwards :443 → :27018
#    reverse_proxy_mode     = true
#    reverse_proxy_https_port = 443
#
#    [server]
#    asset_url = "https://miku.pizza/assets" # orange-clouded CDN domain
#
#    [master_server]
#    advertise = true
#    hostname  = "hatsune.miku.pizza"        # what clients see in the server list
#
# 8. Open firewall ports on the VPS
#    sudo ufw allow 27017/tcp   # TCP game clients (direct)
#    sudo ufw allow 80/tcp      # HTTP (certbot renewal + redirect)
#    sudo ufw allow 443/tcp     # HTTPS/WSS (WebSocket clients via nginx)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS for the game subdomain ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hatsune.miku.pizza;   # ← replace with your subdomain

    # Certbot places its ACME challenge files here during renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS / WebSocket proxy for game connections ──────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hatsune.miku.pizza;   # ← replace with your subdomain

    # Certificates issued by certbot (paths filled in automatically by certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/hatsune.miku.pizza/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hatsune.miku.pizza/privkey.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Privacy — do not log real IPs (Ferris-AO handles them internally)
    access_log off;

    # WebSocket proxy → Ferris-AO WebSocket listener on localhost
    location / {
        proxy_pass         http://127.0.0.1:27018;
        proxy_http_version 1.1;

        # Required for WebSocket upgrades
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;

        # Forward real client IP so Ferris-AO can hash it to an IPID.
        # Because hatsune.miku.pizza is gray-clouded, $remote_addr IS the
        # real client IP — no Cloudflare IP spoofing risk.
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive for long RP sessions (2 hours)
        proxy_read_timeout 7200s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }
}

# ── TCP — legacy AO2-SDL clients ──────────────────────────────────────────────
#
# TCP connections go DIRECTLY to hatsune.miku.pizza:27017 — nginx is not
# involved. Ferris-AO binds 0.0.0.0:27017 so clients can reach it directly.
#
# If you want PROXY Protocol v2 (to recover real IPs on TCP), you need nginx
# compiled with --with-stream, which requires a separate stream { } context.
# Add the block below to /etc/nginx/nginx.conf (outside http { }), or to a
# file in /etc/nginx/stream.d/ if your distro supports it:
#
# stream {
#     server {
#         listen     27016;                   # clients connect on this port
#         proxy_pass 127.0.0.1:27017;         # forward to Ferris-AO TCP listener
#         proxy_protocol        on;           # prepend PROXY Protocol v2 header
#         proxy_connect_timeout 10s;
#         proxy_timeout         7200s;
#     }
# }
#
# Then set bind_addr = "127.0.0.1" in config.toml for TCP (so it only accepts
# connections from nginx, not directly), and tell clients to connect on 27016
# instead of 27017.
#
# For most setups this is not needed — Ferris-AO's privacy layer hashes IPs
# daily regardless. Direct TCP is simpler and works fine.
