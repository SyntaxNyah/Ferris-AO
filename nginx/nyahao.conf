# Ferris-AO nginx configuration
#
# Architecture:
#   Cloudflare (DDoS + SSL) → nginx (this file) → Ferris-AO backend
#
# Prerequisites:
#   - In nginx.conf: include /path/to/nyahao.conf; (inside http { } block)
#   - For TCP legacy clients: nginx compiled with --with-stream
#   - Set reverse_proxy_mode = true in config.toml
#
# Cloudflare notes:
#   - Cloudflare handles TLS — nginx passes plain HTTP to the backend
#   - Real client IP arrives in X-Forwarded-For (set by Cloudflare)
#   - nginx forwards it as both X-Forwarded-For and X-Real-IP
#   - Ferris-AO reads X-Forwarded-For first, then X-Real-IP

# ── Rate limiting zones (place in http { } block) ─────────────────────────────
#
# If Cloudflare is in front, $remote_addr will be a Cloudflare IP.
# Use the real client IP from X-Forwarded-For for accurate rate limiting:
#
# map $http_x_forwarded_for $real_client_ip {
#     ""      $remote_addr;
#     default $http_x_forwarded_for;
# }
# limit_conn_zone $real_client_ip zone=ws_conn:10m;
# limit_req_zone  $real_client_ip zone=ws_rate:10m rate=10r/s;

# ── WebSocket — plain HTTP (Cloudflare terminates TLS) ────────────────────────
#
# Cloudflare proxies HTTPS (443) → this nginx block (80) → Ferris-AO WS (:27018)
# Set ws_port = 27018 and bind_addr = "127.0.0.1" in config.toml.

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;  # ← replace with your domain

    # Rate limiting (uncomment after defining zones above).
    # limit_conn ws_conn 8;
    # limit_req  zone=ws_rate burst=20 nodelay;

    location / {
        proxy_pass         http://127.0.0.1:27018;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;

        # Forward real client IP. Cloudflare sets X-Forwarded-For automatically.
        # nginx passes it through; Ferris-AO reads the first address in the list.
        proxy_set_header   X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header   X-Real-IP       $http_x_forwarded_for;

        # Long timeouts for persistent WebSocket connections (2 hours).
        proxy_read_timeout 7200s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }
}

# ── WebSocket — direct TLS (no Cloudflare) ────────────────────────────────────
#
