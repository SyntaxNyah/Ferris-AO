# NyahAO nginx configuration
#
# Architecture:
#   Cloudflare (DDoS + SSL) → nginx (this file) → NyahAO backend (:27017)
#
# Prerequisites:
#   - nginx compiled with --with-stream (for TCP proxy)
#   - In nginx.conf http block: include /path/to/nyahao.conf;
#   - In nginx.conf stream block (separate file or same): include the stream section below
#
# For Cloudflare setups:
#   - Real client IP is in CF-Connecting-IP header (set automatically by Cloudflare)
#   - Backend only needs to trust CF-Connecting-IP when peer is 127.0.0.1
#   - NyahAO handles this in websocket.rs: only trusts proxy headers from loopback peers

# ── HTTP context (WebSocket upgrade for webAO clients) ────────────────────────
#
# Add this server block inside your nginx http { } context.
# If using a separate stream config file, place the stream block there.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your.domain.example;  # ← replace with your domain

    ssl_certificate     /etc/letsencrypt/live/your.domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Rate limiting: 8 simultaneous WS connections per real IP, 10 req/s burst.
    # Zones are defined in the http block (see below).
    limit_conn ws_conn 8;
    limit_req  zone=ws_rate burst=20 nodelay;

    location / {
        proxy_pass          http://127.0.0.1:27017;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";

        # Forward real client IP. Cloudflare sets CF-Connecting-IP; we also
        # forward as X-Real-IP for compatibility. NyahAO picks CF-Connecting-IP first.
        proxy_set_header    CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header    X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header    X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header    Host              $host;

        # Long timeouts for persistent WS connections (2 hours).
        proxy_read_timeout  7200s;
        proxy_send_timeout  30s;
        proxy_buffering     off;
    }
}

# ── Shared http-context directives (place in http { } block) ─────────────────
#
# If Cloudflare is in front, all TCP peers will be Cloudflare IPs.
# The real client IP arrives in CF-Connecting-IP. Use that for rate limiting.

# map $http_cf_connecting_ip $real_client_ip {
#     ""      $remote_addr;
#     default $http_cf_connecting_ip;
# }
# limit_conn_zone $real_client_ip zone=ws_conn:10m;
# limit_req_zone  $real_client_ip zone=ws_rate:10m rate=10r/s;

# ── Stream context (TCP for legacy AO2-SDL clients) ───────────────────────────
#
# Place this in a stream { } context. With Cloudflare, TCP passthrough requires
# Cloudflare Spectrum (paid). Without Cloudflare, expose port 27016 directly.
